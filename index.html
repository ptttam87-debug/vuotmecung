<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vượt Mê Cung - Phiên Bản Nâng Cấp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap');

        :root {
            --bg-dark: #070b14;
            --primary-glow: #10b981; 
            --accent: #fbbf24; 
            --text-main: #f3f4f6;
            --danger: #ef4444;
            --bg-modal: rgba(16, 24, 39, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a2639 0%, var(--bg-dark) 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 2px, transparent 2px, transparent 12px);
            z-index: -1;
        }

        .container {
            background: rgba(16, 24, 39, 0.85);
            padding: 40px; border-radius: 16px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15), inset 0 0 20px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.3);
            width: 90%; max-width: 450px;
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.5s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-family: 'Cinzel', serif; color: var(--accent);
            font-size: 32px; margin-bottom: 5px; letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        p.subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .instruction { color: #d1d5db; font-size: 15px; margin-bottom: 20px; font-style: italic; }

        input[type="text"] {
            width: 100%; padding: 15px; margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #374151;
            border-radius: 8px; color: white; font-size: 16px; font-weight: bold; letter-spacing: 2px;
            box-sizing: border-box; text-align: center; transition: 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary-glow); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        .btn {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #047857, #10b981);
            border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px;
        }
        .btn:hover { background: linear-gradient(45deg, #059669, #34d399); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .btn:disabled { background: #4b5563; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-secondary { background: transparent; border: 1px solid var(--primary-glow); color: var(--primary-glow); }
        .btn-secondary:hover { background: rgba(16, 185, 129, 0.1); }

        .hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; font-weight: 600; color: var(--accent); }
        .station-title { font-size: 24px; color: var(--primary-glow); margin-bottom: 25px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        #btnToggleSound {
            background: rgba(16, 185, 129, 0.2); border: 1px solid var(--primary-glow); color: var(--primary-glow);
            border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; outline: none; transition: 0.3s;
        }
        #btnToggleSound:hover { background: rgba(16, 185, 129, 0.4); }

        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; border-bottom: 1px solid #374151; text-align: left; }
        .leaderboard-table th { color: var(--primary-glow); font-size: 12px; text-transform: uppercase; }
        .rank-1 { color: #fbbf24; font-weight: bold; text-shadow: 0 0 5px rgba(251, 191, 36, 0.5); }
        .rank-2 { color: #d1d5db; font-weight: bold; }
        .rank-3 { color: #b45309; font-weight: bold; }

        #liveIndicator {
            display: inline-block; width: 8px; height: 8px; background: #ef4444; border-radius: 50%;
            margin-right: 5px; animation: blink 1s infinite;
        }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }
        
        .timer-warning { color: var(--danger) !important; animation: blink 1s infinite; }

        /* ==========================================
           PHONG CÁCH MODAL TÙY CHỈNH MỚI
           ========================================== */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; animation: fadeInModal 0.4s ease-out; }

        .modal-container {
            background: var(--bg-modal);
            padding: 30px; border-radius: 12px;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2), inset 0 0 15px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.4);
            width: 80%; max-width: 350px; text-align: center;
            position: relative;
        }

        #modalTitle {
            font-family: 'Cinzel', serif; color: var(--accent);
            font-size: 24px; margin-bottom: 15px; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        #modalMessage {
            color: var(--text-main); font-size: 14px; margin-bottom: 20px; line-height: 1.5;
        }

        @keyframes fadeInModal { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="mecung.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="screen-start" class="screen active">
            <h1>VƯỢT MÊ CUNG</h1>
            <p class="subtitle">Nhập tên đội của bạn để bắt đầu hành trình<br><span style="color:var(--danger); font-size: 12px;">(Lưu ý: Bạn chỉ có 1 lượt chơi duy nhất trong 15 phút)</span></p>
            <input type="text" id="playerName" placeholder="Tên Đội / Mã số..." autocomplete="off">
            <button class="btn" id="btnStart">Tiến Vào Mê Cung (Enter)</button>
            <button class="btn btn-secondary" id="btnViewLeaderboard">Xem Bảng Vàng Top 10</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="hud">
                <span id="scoreDisplay">Năng lượng: 0</span>
                <button id="btnToggleSound">🔊 Nhạc</button>
                <span id="timeDisplay">Thời gian: 15:00</span>
            </div>
            <div class="station-title" id="stationName">Trạm 1</div>
            <div class="instruction">Tiến hành giải mã và nhập đáp án để mở cổng</div>
            <input type="text" id="playerAnswer" placeholder="Nhập mã khóa..." autocomplete="off">
            <button class="btn" id="btnSubmitAnswer">Kích Hoạt (Enter)</button>
            <p id="feedback" style="margin-top: 15px; font-size: 14px; height: 20px; font-weight: 600;"></p>
        </div>

        <div id="screen-leaderboard" class="screen">
            <h1>BẢNG VÀNG</h1>
            <p class="subtitle"><span id="liveIndicator"></span>Cập nhật trực tiếp</p>
            <p id="finalResult" style="color: var(--primary-glow); font-weight: bold; margin-bottom: 20px;"></p>
            
            <table class="leaderboard-table" id="leaderboardTable">
                <thead>
                    <tr>
                        <th>Hạng</th>
                        <th>Đội / Cá nhân</th>
                        <th>Điểm</th>
                        <th>Thời gian</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <h2 id="modalTitle">THÔNG BÁO</h2>
            <p id="modalMessage"></p>
            <button class="btn" id="modalButton">Xác Nhận (Enter)</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CHỐNG GIAN LẬN: KHÓA CHUỘT PHẢI & PHÍM TẮT F12, CTRL+U
        // ==========================================
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.keyCode === 123 || // F12
               (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74 || event.keyCode === 67)) || // Ctrl+Shift+I/J/C
               (event.ctrlKey && event.keyCode === 85)) { // Ctrl+U
                event.preventDefault();
            }
        });

        // ==========================================
        // KHỞI TẠO FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB1b8fzYweiF5v5eokhpfLJkA336NIELB8",
            authDomain: "vuotmecung.firebaseapp.com",
            databaseURL: "https://vuotmecung-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "vuotmecung",
            storageBucket: "vuotmecung.firebasestorage.app",
            messagingSenderId: "480201793770",
            appId: "1:480201793770:web:1a817e80ca9d7d8a66b793"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const leaderboardRef = database.ref('vuot_me_cung_leaderboard');

        // ==========================================
        // CẤU HÌNH ÂM THANH
        // ==========================================
        const sfxCorrect = new Audio('https://www.myinstants.com/media/sounds/correct.mp3');
        const sfxWrong = new Audio('https://www.myinstants.com/media/sounds/wrong-buzzer.mp3');
        const sfxWin = new Audio('https://www.myinstants.com/media/sounds/level-up.mp3');
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.4;

        document.getElementById('btnToggleSound').addEventListener('click', () => {
            if (bgMusic.paused) { 
                bgMusic.play(); 
                document.getElementById('btnToggleSound').innerText = "🔊 Nhạc"; 
            } else { 
                bgMusic.pause(); 
                document.getElementById('btnToggleSound').innerText = "🔇 Tắt"; 
            }
        });

        const stations = [
            { name: "Trạm 1: Khởi Nguyên", answerHash: "Mzk1NA==" }, 
            { name: "Trạm 2: Ảo Ảnh", answerHash: "MjAzOA==" },      
            { name: "Trạm 3: Lối Rẽ", answerHash: "MjU=" },          
            { name: "Trạm 4: Cốt Lõi", answerHash: "MTU1OQ==" }      
        ];
        
        let currentPlayer = "";
        let currentStationIndex = 0;
        let score = 0;
        let timeLeft = 900; // Đã đổi thành 15 phút = 900 giây
        let timerInterval;

        const screenStart = document.getElementById('screen-start');
        const screenGame = document.getElementById('screen-game');
        const screenLeaderboard = document.getElementById('screen-leaderboard');
        const playerNameInput = document.getElementById('playerName');
        const playerAnswerInput = document.getElementById('playerAnswer');
        const stationName = document.getElementById('stationName');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const feedback = document.getElementById('feedback');
        const finalResult = document.getElementById('finalResult');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalButton = document.getElementById('modalButton');

        function showGameModal(title, message, callback) {
            modalTitle.innerText = title;
            modalMessage.innerText = message;
            modalOverlay.classList.add('active');
            modalButton.focus();

            const closeHandler = () => {
                modalOverlay.classList.remove('active');
                modalButton.removeEventListener('click', closeHandler);
                document.removeEventListener('keydown', keyHandler);
                if (callback) callback();
            };

            const keyHandler = (e) => {
                if (e.key === 'Enter') {
                    closeHandler();
                }
            };

            modalButton.addEventListener('click', closeHandler);
            document.addEventListener('keydown', keyHandler);
        }

        function showScreen(screenElement) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            screenElement.classList.add('active');
        }

        document.getElementById('btnStart').addEventListener('click', startGame);
        playerNameInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') startGame(); });

        function startGame() {
            if (playerNameInput.value.trim() === "") { 
                showGameModal("CẢNH BÁO", "Vui lòng nhập tên đội để bắt đầu!");
                return; 
            }
            
            if (localStorage.getItem("vuotmecung_played")) {
                showGameModal("Hệ Thống Khóa", "Đội của bạn đã sử dụng hết 1 lượt chơi duy nhất. Hệ thống sẽ chuyển đến Bảng Vàng.", function() {
                    showScreen(screenLeaderboard);
                });
                return;
            }

            bgMusic.play().catch(e => console.log("Trình duyệt chặn Autoplay cho đến khi có tương tác"));
            localStorage.setItem("vuotmecung_played", "true");

            currentPlayer = playerNameInput.value.trim();
            currentStationIndex = 0; 
            score = 0;
            timeLeft = 900; // Reset thành 900 giây (15 phút)
            timeDisplay.classList.remove('timer-warning');
            
            showScreen(screenGame); 
            loadStation();
            
            // THUẬT TOÁN ĐẾM NGƯỢC 15 PHÚT
            timerInterval = setInterval(() => {
                timeLeft--;
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                timeDisplay.innerText = `Thời gian: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

                if (timeLeft <= 60) {
                    timeDisplay.classList.add('timer-warning'); // Cảnh báo nhấp nháy đỏ
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showGameModal("HẾT GIỜ", "Đã hết 15 phút! Hệ thống tự động khóa và nộp bài hiện tại.", function() {
                        finishGame(true);
                    });
                }
            }, 1000);
        }

        function loadStation() {
            playerAnswerInput.value = ""; 
            playerAnswerInput.focus(); 
            feedback.innerText = "";
            stationName.innerText = stations[currentStationIndex].name;
            scoreDisplay.innerText = `Năng lượng: ${score}`;
        }

        document.getElementById('btnSubmitAnswer').addEventListener('click', checkAnswer);
        playerAnswerInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });

        function checkAnswer() {
            document.getElementById('btnSubmitAnswer').disabled = true;
            let userAnswer = playerAnswerInput.value.trim();
            
            let hashedUserAnswer = btoa(userAnswer);

            if (hashedUserAnswer === stations[currentStationIndex].answerHash) {
                sfxCorrect.currentTime = 0; 
                sfxCorrect.play();
                score += 10;
                feedback.style.color = "var(--primary-glow)"; 
                feedback.innerText = "Mã khóa chính xác! Cổng đã mở.";
            } else {
                sfxWrong.currentTime = 0; 
                sfxWrong.play();
                feedback.style.color = "var(--danger)"; 
                feedback.innerText = "Sai mã khóa. Thất bại tại trạm này.";
            }
            scoreDisplay.innerText = `Năng lượng: ${score}`;

            setTimeout(() => {
                currentStationIndex++;
                document.getElementById('btnSubmitAnswer').disabled = false;
                if (currentStationIndex < stations.length) { 
                    loadStation(); 
                } else { 
                    finishGame(false); 
                }
            }, 1200);
        }

        function finishGame(isTimeout = false) {
            clearInterval(timerInterval);
            let timeUsed = 900 - timeLeft; // Tính điểm dựa trên 900 giây
            
            sfxWin.currentTime = 0; 
            sfxWin.play();

            showScreen(screenLeaderboard);
            
            if (isTimeout) {
                finalResult.innerText = `Hết thời gian! Đạt ${score} điểm.`;
            } else {
                finalResult.innerText = `Hoàn thành! Đạt ${score} điểm với tổng thời lượng ${timeUsed} giây.`;
            }

            leaderboardRef.push({
                name: currentPlayer,
                score: score,
                time: timeUsed,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        document.getElementById('btnViewLeaderboard').addEventListener('click', () => {
            showScreen(screenLeaderboard);
            finalResult.innerText = ""; 
        });

        leaderboardRef.on('value', (snapshot) => {
            let data = [];
            snapshot.forEach((childSnapshot) => {
                data.push(childSnapshot.val());
            });

            data.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.time - b.time;
            });

            let top10 = data.slice(0, 10);
            renderLeaderboard(top10);
        });

        function renderLeaderboard(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            data.forEach((player, index) => {
                let rankClass = index === 0 ? 'rank-1' : (index === 1 ? 'rank-2' : (index === 2 ? 'rank-3' : ''));
                let row = `<tr>
                    <td class="${rankClass}">#${index + 1}</td>
                    <td class="${rankClass}">${player.name}</td>
                    <td>${player.score}</td>
                    <td>${player.time}s</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
